<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>GETCODE IDE V7.0 - Ultimate Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <style>
        .tabs { display: flex; background: #0d1117; padding-top: 5px; border-bottom: 1px solid var(--border); }
        .tab { padding: 5px 15px; background: #161b22; color: #8b949e; border: 1px solid var(--border); border-bottom: none; border-radius: 4px 4px 0 0; margin-right: 2px; cursor: pointer; font-size: 12px; font-family: monospace; }
        .tab.active { background: #010409; color: #c9d1d9; border-top: 2px solid var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container" id="main-layout">
        <!-- 1. 左上：控制面板 -->
        <div class="panel" id="control-panel">
            <div class="getcode-title">GETCODE</div>
            <select id="model-select">
                <optgroup label="Gemini 系列 (核心與多模態)">
                    <option value="models/gemini-2.5-flash" selected>Gemini 2.5 Flash</option>
                    <option value="models/gemini-2.5-pro">Gemini 2.5 Pro</option>
                    <option value="models/gemini-2.0-flash">Gemini 2.0 Flash</option>
                    <option value="models/gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
                    <option value="models/gemini-3.1-flash-lite-preview">Gemini 3.1 Flash-Lite Preview</option>
                    <option value="models/gemini-flash-latest">Gemini Flash Latest</option>
                    <option value="models/gemini-pro-latest">Gemini Pro Latest</option>
                </optgroup>
                <optgroup label="Gemma 系列">
                    <option value="models/gemma-4-31b-it">Gemma 4 31B IT</option>
                </optgroup>
            </select>
            <textarea id="task-input" class="task-input" placeholder="例如：同時開發資料生成與分析功能..."></textarea>
            <button id="ai-btn" class="primary-btn">生成專案代碼 (多檔案)</button>
        </div>

        <!-- 2. 右上：日誌與檔案 -->
        <div class="panel" id="logs-panel">
            <div style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
                <div class="panel-label">SYSTEM LOGS</div>
                <div id="logs" class="log-area">> 系統已就緒...</div>
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; min-height: 0; margin-top: 10px;">
                <div class="panel-label">📂 WORKSPACE EXPLORER</div>
                <div id="file-list" class="file-list-area">等待執行...</div>
            </div>
        </div>

        <!-- 3. 左下：編輯器 -->
        <div class="panel" id="editor-panel">
            <div class="tabs" id="tab-bar"></div>
            <div class="toolbar" style="margin-top: 8px;">
                <button id="btn-open" class="tool-btn">📂 開啟本機</button>
                <button id="btn-save" class="tool-btn">💾 儲存本機</button>
            </div>
            <textarea id="editor-content"></textarea>
        </div>

        <!-- 4. 右下：終端輸出 -->
        <div class="panel" id="terminal-panel">
            <div class="toolbar" style="justify-content: space-between;">
                <button class="run-btn" id="run-btn">▶ RUN 當前分頁</button>
                <button id="dl-btn" class="tool-btn" style="display: none; background: #3fb950; color: white;">📥 下載圖表</button>
            </div>
            <div class="terminal-output" id="terminal-output">等待結果...</div>
        </div>

        <!-- 5. 佈局控制元素 (Resizers) -->
        <div class="resizer-v"></div>
        <div class="resizer-h"></div>
        <div class="resizer-cross" id="cross-handler"></div>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
