services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ultra-v5-backend
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
      - ${HOME}/.config/gcloud/application_default_credentials.json:/app/gcp-key.json:ro
    # 🌟 關鍵修復：明確指示 Docker 讀取根目錄的 .env 檔案
    env_file:
      - .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json
      - GOOGLE_CLOUD_PROJECT=gemcode-v5-platform
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ultra-v5-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: always

networks:
  default:
    name: ultra-net
