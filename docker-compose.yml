# docker-compose.yml
services:
  gemcode-cloud-simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gemcode-local-cloud
    ports:
      - "8080:8080"
    volumes:
      # 保留工作區的資料掛載，這樣你重啟容器時代碼不會不見
      - ./backend/workspaces:/app/workspaces
    env_file:
      # 載入你的 API KEY
      - .env.backend
    environment:
      # 強制指定與 Cloud Run 相同的 PORT 變數
      - PORT=8080
